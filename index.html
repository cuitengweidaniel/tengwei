<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allen Cui - Immersive Experience</title>
    <style>
        /* 基础重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            height: 100%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden; /* 隐藏滚动条，保持全屏沉浸感 */
        }

        /* 1. 加载屏幕 (Loading Screen) */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1.5s ease-out;
        }
        .progress-text {
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.7);
        }
        .progress-bar {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
        }
        .progress-fill {
            position: absolute;
            top: 0; left: 0; height: 100%; width: 0%;
            background: #fff;
            transition: width 0.1s linear;
        }

        /* 2. 背景层 (可以替换为全屏 <video> ) */
        .bg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* 模拟深邃大气的动态环境光 */
            background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
            z-index: 1;
            animation: breathe 8s infinite alternate ease-in-out;
        }
        @keyframes breathe {
            0% { transform: scale(1); filter: brightness(1); }
            100% { transform: scale(1.05); filter: brightness(1.2); }
        }

        /* 3. 悬浮 UI 层 (四角布局) */
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none; /* 让鼠标事件穿透到背景 */
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .ui-element {
            pointer-events: auto; /* 恢复 UI 元素的点击 */
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.3s;
            cursor: pointer;
        }
        .ui-element:hover { color: #fff; }

        .ui-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .ui-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
        
        .social-links { display: flex; gap: 20px; }
        .sound-toggle { display: flex; align-items: center; gap: 8px; }
        
        /* 音频跳动小动画 */
        .sound-bars { display: flex; gap: 2px; height: 10px; align-items: flex-end; }
        .bar { width: 2px; background: #fff; animation: sound 1s infinite alternate; }
        .bar:nth-child(1) { height: 4px; }
        .bar:nth-child(2) { height: 8px; animation-delay: 0.2s; }
        .bar:nth-child(3) { height: 6px; animation-delay: 0.4s; }
        @keyframes sound { 0% { height: 2px; } 100% { height: 10px; } }

        /* 4. 主视觉中心内容 */
        .center-content {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            text-align: center;
            opacity: 0;
            transition: opacity 2s ease-in 1.5s; /* 在加载完后淡入 */
        }
        h1 {
            font-size: 4vw;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }
        .subtitle {
            font-size: 14px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 50px;
        }

        /* 探索按钮 */
        .btn-explore {
            display: inline-block;
            padding: 15px 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }
        .btn-explore:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        /* 交互提示 */
        .interaction-hint {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            opacity: 0.5;
            animation: float 2s infinite ease-in-out;
        }
        .mouse-icon {
            width: 20px; height: 30px;
            border: 1px solid #fff;
            border-radius: 15px;
            position: relative;
        }
        .mouse-wheel {
            width: 2px; height: 4px;
            background: #fff;
            position: absolute;
            top: 5px; left: 50%;
            transform: translateX(-50%);
            border-radius: 2px;
            animation: scroll 1.5s infinite;
        }
        @keyframes float { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -10px); } }
        @keyframes scroll { 0% { top: 5px; opacity: 1; } 100% { top: 15px; opacity: 0; } }

    </style>
</head>
<body>

    <div id="loader">
        <div class="progress-text" id="progress-text">加载中 0%</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <div class="bg-layer"></div>

    <div class="center-content" id="main-content">
        <h1>Allen Cui</h1>
        <div class="subtitle">Software Engineer | Building Something Great</div>
        <a href="#" class="btn-explore">Commencer L'expérience (开启体验)</a>
    </div>

    <div class="interaction-hint">
        <div class="mouse-icon"><div class="mouse-wheel"></div></div>
        <span class="ui-element" style="font-size: 10px;">Click & Drag</span>
    </div>

    <div class="ui-layer">
        <div class="ui-top">
            <div class="ui-element">WWW.ALLENCUI.COM</div>
            <div class="ui-element">MENU ≡</div>
        </div>
        <div class="ui-bottom">
            <div class="social-links">
                <div class="ui-element">GITHUB</div>
                <div class="ui-element">LINKEDIN</div>
            </div>
            <div class="ui-element sound-toggle">
                SOUND
                <div class="sound-bars">
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let progress = 0;
            const progressText = document.getElementById('progress-text');
            const progressFill = document.getElementById('progress-fill');
            const loader = document.getElementById('loader');
            const mainContent = document.getElementById('main-content');

            // 模拟视频或资源的加载过程
            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 5) + 2; // 随机增加进度
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    
                    // 加载完成后的转场效果
                    setTimeout(() => {
                        loader.style.opacity = '0';
                        setTimeout(() => {
                            loader.style.display = 'none';
                            mainContent.style.opacity = '1';
                        }, 1500); // 等待淡出动画结束
                    }, 500);
                }
                progressText.innerText = `Chargement de l'expérience ${progress}%`;
                progressFill.style.width = `${progress}%`;
            }, 50);
        });
    </script>
</body>
</html>
